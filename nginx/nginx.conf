server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PWA manifest — served dynamically by the Go backend (reflects config.settings.title)
    location = /manifest.json {
        proxy_pass http://127.0.0.1:3001/manifest.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Config API proxy (localhost — same container via supervisord)
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Rewrite backend redirects so /swagger/ stays under /api/swagger/
        proxy_redirect ~^/(.*)$ /api/$1;
    }

    # ── Optional service proxies ────────────────────────────────────
    # Uncomment and adapt blocks for services that are reachable from
    # this container (same Docker network or host IP).
    # nginx resolves upstream hostnames at startup — only enable blocks
    # for hosts that actually exist, otherwise nginx will fail to start.
    #
    # Portainer
    # location /proxy/portainer/ {
    #     proxy_pass http://portainer:9000/;
    #     proxy_set_header Host $host;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }
    #
    # Proxmox
    # location /proxy/proxmox/ {
    #     proxy_pass https://proxmox:8006/;
    #     proxy_ssl_verify off;
    #     proxy_set_header Host $host;
    #     proxy_http_version 1.1;
    # }
    #
    # AdGuard
    # location /proxy/adguard/ {
    #     proxy_pass http://adguard:3000/;
    #     proxy_set_header Host $host;
    # }
    #
    # GitLab
    # location /proxy/gitlab/ {
    #     proxy_pass http://gitlab/;
    #     proxy_set_header Host $host;
    # }
    #
    # Uptime Kuma
    # location /proxy/uptimekuma/ {
    #     proxy_pass http://uptimekuma:3001/;
    #     proxy_set_header Host $host;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    gzip on;
    gzip_types text/plain application/javascript application/json text/css;
}
