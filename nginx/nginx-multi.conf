# Constrain Upgrade/Connection forwarding to prevent HTTP/2 cleartext (h2c) smuggling.
# Only forward Upgrade when it's a known WebSocket-style upgrade; drop h2c/h2 explicitly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
    h2c     '';
    h2      '';
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Config API proxy (docker-compose — config-api is a separate service)
    location /api/ {
        proxy_pass http://config-api:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Service proxies — add your upstream services here
    # Portainer
    location /proxy/portainer/ {
        proxy_pass http://portainer:9000/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Proxmox
    location /proxy/proxmox/ {
        proxy_pass https://proxmox:8006/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    # AdGuard
    location /proxy/adguard/ {
        proxy_pass http://adguard:3000/;
        proxy_set_header Host $host;
    }

    # GitLab
    location /proxy/gitlab/ {
        proxy_pass http://gitlab/;
        proxy_set_header Host $host;
    }

    # Uptime Kuma
    location /proxy/uptimekuma/ {
        proxy_pass http://uptimekuma:3001/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    gzip on;
    gzip_types text/plain application/javascript application/json text/css;
}
