name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE: beedevztech/hive

jobs:
  release:
    name: Build, Scan & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create GitHub Release
      security-events: write  # upload Trivy SARIF
      pull-requests: read  # git-cliff GitHub metadata

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # ── Tests (gate before publish) ───────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: config-api/go.mod
          cache-dependency-path: config-api/go.sum

      - name: Run Go tests
        working-directory: config-api
        run: go test -race ./...

      # ── Changelog ─────────────────────────────────────────────────
      - name: Install git-cliff
        run: |
          VER=$(curl -s https://api.github.com/repos/orhun/git-cliff/releases/latest \
                | grep '"tag_name"' | head -1 | cut -d'"' -f4 | tr -d 'v')
          curl -sSfL \
            "https://github.com/orhun/git-cliff/releases/download/v${VER}/git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /tmp
          find /tmp -name 'git-cliff' -type f | head -1 | xargs -I{} install -m755 {} /usr/local/bin/git-cliff

      - name: Generate changelog
        id: changelog
        run: |
          git-cliff --config cliff.toml --latest --strip header --output CHANGELOG.md
          {
            echo 'content<<EOF'
            cat CHANGELOG.md
            echo EOF
          } >> "$GITHUB_OUTPUT"
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}

      # ── Docker build ──────────────────────────────────────────────
      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (local — for scanning)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security scan ─────────────────────────────────────────────
      - name: Trivy — container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"          # fail pipeline on CRITICAL/HIGH CVEs
          ignore-unfixed: true    # skip vulnerabilities with no fix yet

      - name: Trivy — generate SARIF report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"          # advisory only — gate is the table step above
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true   # requires public repo or GitHub Advanced Security
        with:
          sarif_file: trivy-results.sarif

      # ── SBOM ──────────────────────────────────────────────────────
      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: syft ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }} -o spdx-json > sbom.spdx.json

      # ── Push to Docker Hub ────────────────────────────────────────
      - name: Push to Docker Hub (multi-platform)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha

      # ── GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ${{ steps.changelog.outputs.content }}

            ---

            **Docker Hub**
            ```bash
            docker pull beedevztech/hive:${{ steps.version.outputs.VERSION }}
            ```

            **Update your server**
            ```bash
            VERSION=${{ steps.version.outputs.VERSION }} \
              docker compose -f docker-compose.prod.yml pull && \
              docker compose -f docker-compose.prod.yml up -d
            ```
          files: sbom.spdx.json
