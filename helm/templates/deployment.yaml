apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hive.fullname" . }}
  labels:
    {{- include "hive.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hive.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hive.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when config or secret changes.
        checksum/config: {{ .Values.config | sha256sum }}
        checksum/secret: {{ .Values.hiveToken | sha256sum }}
    spec:
      # nginx-unprivileged runs as uid 101; fsGroup ensures mounted volumes are writable.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.persistence.enabled }}
      initContainers:
        - name: init-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /config/config.yaml ]; then
                echo "Copying initial config..."
                cp /init-config/config.yaml /config/config.yaml
              else
                echo "Config already exists, skipping."
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: init-config
              mountPath: /init-config
      {{- end }}
      containers:
        - name: hive
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: HIVE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "hive.fullname" . }}
                  key: HIVE_TOKEN
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hive.fullname" . }}
        - name: init-config
          configMap:
            name: {{ include "hive.fullname" . }}
          {{- else }}
          configMap:
            name: {{ include "hive.fullname" . }}
          {{- end }}
